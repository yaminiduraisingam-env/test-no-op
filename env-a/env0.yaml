version: 2
shell: bash

deploy:
  steps:
    setupVariables:
      after:
        - name: Install Python versions
          run: |
            set -e
            sudo apk add --no-cache curl git build-base linux-headers ca-certificates openssl-dev zlib-dev bzip2-dev readline-dev sqlite-dev xz-dev libffi-dev ncurses-dev tk-dev
            export PYENV_ROOT="$HOME/.pyenv"
            export PATH="$PYENV_ROOT/bin:$PYENV_ROOT/shims:$PATH"
            if [ ! -d "$PYENV_ROOT" ]; then
              git clone https://github.com/pyenv/pyenv.git "$PYENV_ROOT"
            fi
            eval "$(pyenv init -)"
            sudo pyenv install -s 3.10.14
            sudo pyenv install -s 3.11.9
            sudo pyenv install -s 3.12.3
            sudo pyenv global 3.11.9
            printf 'PYENV_ROOT=%s\n' "$PYENV_ROOT" >> "$ENV0_ENV"
            printf 'PATH=%s\n' "$PYENV_ROOT/shims:$PYENV_ROOT/bin:$PATH" >> "$ENV0_ENV"
            printf 'PYENV_VERSION=%s\n' "3.11.9" >> "$ENV0_ENV"

    terraformInit:
      before:
        - name: Verify Python versions
          run: |
            set -e
            export PYENV_ROOT="${PYENV_ROOT:-$HOME/.pyenv}"
            export PATH="$PYENV_ROOT/shims:$PYENV_ROOT/bin:$PATH"
            eval "$(pyenv init -)"
            pyenv versions
            python --version
            PYENV_VERSION=3.10.14 python --version
            PYENV_VERSION=3.11.9 python --version
            PYENV_VERSION=3.12.3 python --version
