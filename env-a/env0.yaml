version: 2

deploy:
  steps:
    terraformInit:
      before:
        - name: Install multiple Python versions in pre-init env0 step
          run: |
            set -e
            apt-get update
            apt-get install -y \
              build-essential curl git ca-certificates \
              libssl-dev zlib1g-dev libbz2-dev \
              libreadline-dev libsqlite3-dev libffi-dev \
              libncursesw5-dev xz-utils tk-dev libxml2-dev \
              libxmlsec1-dev liblzma-dev

            export PYENV_ROOT="$HOME/.pyenv"
            export PATH="$PYENV_ROOT/bin:$PATH"

            if [ ! -d "$PYENV_ROOT" ]; then
              git clone https://github.com/pyenv/pyenv.git "$PYENV_ROOT"
            fi

            eval "$(pyenv init -)"

            pyenv install -s 3.10.14
            pyenv install -s 3.11.9
            pyenv install -s 3.12.3

            pyenv versions

            echo "Using Python 3.11.9 by default"
            pyenv global 3.11.9
            python --version

            echo "Run something with 3.10.14"
            PYENV_VERSION=3.10.14 python --version

            echo "Run something with 3.12.3"
            PYENV_VERSION=3.12.3 python --version
